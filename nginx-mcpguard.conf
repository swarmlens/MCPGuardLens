# ═══════════════════════════════════════════════════════════
#  nginx snippet for MCPGuard
#  Drop in /etc/nginx/sites-available/mcpguard
#  and symlink: ln -s ../sites-available/mcpguard sites-enabled/
#  Then: nginx -t && systemctl reload nginx
# ═══════════════════════════════════════════════════════════

# Gateway — agents connect here
server {
    listen 443 ssl;
    server_name mcpguard.yourdomain.com;

    # Your existing certs
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Only forward — no direct access
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE / streaming support (MCP uses it)
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Pass the API key header through
        proxy_set_header   X-MCPGuard-Key    $http_x_mcpguard_key;
    }
}

# Grafana dashboard
server {
    listen 443 ssl;
    server_name grafana.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Grafana websockets (live dashboard updates)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name mcpguard.yourdomain.com grafana.yourdomain.com;
    return 301 https://$host$request_uri;
}
